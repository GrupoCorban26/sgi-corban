# ============================================
# Evolution API v2 — Docker Compose (Desarrollo)
# ============================================
# Solo para levantar Evolution API en tu laptop
# Tu backend y frontend siguen corriendo con
# uvicorn y npm run dev (sin Docker)
# ============================================
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f
#   docker compose -f docker-compose.dev.yml down
# ============================================

services:
  # ----------------------------------------------------------------
  # PostgreSQL para Evolution API (BD interna, ligera)
  # ----------------------------------------------------------------
  evo-postgres:
    image: postgres:15-alpine
    container_name: evo_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo_dev_pass_2026
      POSTGRES_DB: evolution
    ports:
      - "5432:5432"
    volumes:
      - evo_pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # Evolution API v2
  # ----------------------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api_dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── Servidor ──
      - SERVER_URL=http://localhost:8080
      - SERVER_PORT=8080

      # ── Autenticación ──
      - AUTHENTICATION_API_KEY=sgi_evo_dev_key_2026
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # ── Base de datos (PostgreSQL) ──
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:evo_dev_pass_2026@evo-postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      # Desactivados para evitar bottlenecks en la conexión inicial (causa de QR failure)
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - DATABASE_SAVE_DATA_HISTORIC=false
      - DATABASE_SAVE_DATA_LABELS=false

      # ── Cache ──
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true

      # ── Webhooks globales → tu backend local ──
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/api/v1/comercial/supervision/webhook
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
      - WEBHOOK_EVENTS_CONTACTS_SET=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=false
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false
      
      # ── Sesión WhatsApp (requerido para generar QR) ──
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1033773198
      - CONFIG_SESSION_PHONE_CLIENT=Evolution API
      - NODE_OPTIONS=--network-family-autoselection-attempt-timeout=1000

      # ── Logs ──
      - LOG_LEVEL=WARN
      - DEL_INSTANCE=false

    volumes:
      - evolution_instances_dev:/evolution/instances
    depends_on:
      evo-postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  evo_pg_data_dev:
  evolution_instances_dev:
