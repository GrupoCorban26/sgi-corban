# ============================================
# SGI Grupo Corban — Docker Compose (Producción)
# ============================================
# Arquitectura:
#   Cloudflare Tunnel → localhost:3000 (Frontend)
#   Cloudflare Tunnel → localhost:8000 (Backend)
#   Worker de tareas (scheduler) en background
# ============================================
# Uso:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
# ============================================

services:
  # ----------------------------------------------------------------
  # BACKEND (FastAPI + Uvicorn)
  # ----------------------------------------------------------------
  backend:
    build: ./sgi-backend
    container_name: sgi_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./sgi-backend/.env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_uploads:/app/uploads

  # ----------------------------------------------------------------
  # WORKER DE TAREAS (Scheduler / Cron Jobs)
  # ----------------------------------------------------------------
  worker:
    build: ./sgi-backend
    container_name: sgi_worker
    restart: unless-stopped
    command: ["python", "worker_tareas.py"]
    env_file:
      - ./sgi-backend/.env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  # ----------------------------------------------------------------
  # FRONTEND (Next.js Standalone)
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./sgi-frontend
      args:
        API_URL: https://api.sgi-grupocorban.com/api/v1
        JWT_SECRET: ${JWT_SECRET}
    container_name: sgi_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_uploads:
